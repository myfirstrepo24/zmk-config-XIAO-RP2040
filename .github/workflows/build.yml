# .github/workflows/build.yml
name: Build ZMK firmware
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential python3-venv python3-pip

      - name: Create virtual environment
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip

      - name: Install west and Python requirements
        run: |
          . .venv/bin/activate
          pip install --upgrade pip
          pip install west
          pip install -r requirements.txt || true

      - name: Initialize west workspace (if present)
        run: |
          . .venv/bin/activate
          if [ -f west.yml ]; then
            west init -l .
            west update --depth 1 || true
          else
            echo "No west.yml found; skipping west init/update"
          fi

      - name: Build ZMK firmware
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
        run: |
          . .venv/bin/activate
          echo "Workspace listing:"
          ls -la
          # Adjust source dir (-s) and board (-b) to match your repo
          west build -s config -b seeed_xiao_rp2040 -- -DSHIELD=macropad_4x3

      - name: Collect firmware files
        run
