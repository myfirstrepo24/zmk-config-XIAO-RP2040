name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare and build ZMK
        shell: bash
        run: |
          set -euo pipefail

          # Create workspace
          mkdir -p workspace

          # Move repo contents into workspace (skip workspace itself)
          shopt -s dotglob || true
          for entry in * .[^.]*; do
            [ "$entry" = "workspace" ] && continue
            [ ! -e "$entry" ] && continue
            mv -f -- "$entry" workspace/ || true
          done

          cd workspace

          # Clean any old west workspace
          rm -rf .west west.yml zmk zephyr modules bootloader || true

          # Ensure config directory exists
          mkdir -p config

          # Write west manifest
          cat > config/west.yml << 'EOF'
manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
EOF

          # Install west
          python -m pip install --upgrade pip
          pip install west

          # Initialize and update
          west init -l config
          west update -v

          # Build firmware
          west build -s config -b seeed_xiao_rp2040 -- -DSHIELD=macropad_4x3

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: workspace/build/zephyr/zmk.uf2

