name: Build ZMK firmware
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential python3-venv python3-pip

      - name: Create and activate venv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip

      - name: Install ZMK toolchain prerequisites
        run: |
          . .venv/bin/activate
          pip install west
          pip install -r requirements.txt || true

      - name: Initialize west (if using west)
        run: |
          . .venv/bin/activate
          if [ -f west.yml ]; then
            west init -l .
            west update || true
          fi

      - name: Run minimal build (debug)
        run: |
          . .venv/bin/activate
          echo "Starting minimal ZMK build check"
          # Replace the following with your actual build commands
          # Example placeholder:
          if command -v west >/dev/null 2>&1; then
            echo "west available"
          else
            echo "west not found, skipping full build"
          fi

      - name: Upload debug artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zmk-debug-log
          path: |
            .venv
            || true

