name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare and build ZMK in one step
        run: |
          mkdir -p workspace
          # move repo contents into workspace (ignore errors)
          shopt -s dotglob || true
          mv -- * workspace/ || true
          mv -- .[^.]* workspace/ || true
          cd workspace
          rm -rf .west west.yml zmk zephyr modules bootloader
          pip install west
          west init -l config
          west update
          west build -s config -b seeed_xiao_rp2040 -- -DSHIELD=macropad_4x3
        shell: bash

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: workspace/build/zephyr/zmk.uf2
