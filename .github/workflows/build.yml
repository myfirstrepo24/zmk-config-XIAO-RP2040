name: Build ZMK firmware
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential python3-venv python3-pip

      - name: Create virtual environment
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip

      - name: Install west and requirements
        run: |
          . .venv/bin/activate
          pip install west
          pip install -r requirements.txt || true

      - name: Initialize west and update
        run: |
          . .venv/bin/activate
          if [ -f west.yml ]; then
            west init -l .
            west update || true
          fi

      - name: Build ZMK firmware
        run: |
          . .venv/bin/activate
          # Adjust board and shield to match your config
          west build -s config -b seeed_xiao_rp2040 -- -DSHIELD=macropad_4x3
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr

      - name: Collect firmware files
        run: |
          mkdir -p artifacts
          # common Zephyr output paths
          if [ -f build/zephyr/zephyr.uf2 ]; then
            cp build/zephyr/zephyr.uf2 artifacts/
          fi
          if [ -f build/zephyr/zephyr.bin ]; then
            cp build/zephyr/zephyr.bin artifacts/
          fi
          if [ -f build/zephyr/zephyr.hex ]; then
            cp build/zephyr/zephyr.hex artifacts/
          fi

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: artifacts
