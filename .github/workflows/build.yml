# .github/workflows/build.yml
name: Build ZMK firmware
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential python3-venv python3-pip cmake ninja-build

      - name: Create virtual environment
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip setuptools

      - name: Install west (initial)
        run: |
          . .venv/bin/activate
          pip install --upgrade pip
          pip install west

      - name: Install Zephyr and repo requirements and refresh west
        run: |
          . .venv/bin/activate
          if [ -d zephyr ] && [ -f zephyr/scripts/requirements.txt ]; then
            pip install -r zephyr/scripts/requirements.txt || true
          fi
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          fi
          pip install --force-reinstall west

      - name: Initialize west workspace
        run: |
          . .venv/bin/activate
          if [ -f config/west.yml ]; then
            (cd config && west init -l .) || true
            (cd config && west update --depth 1) || true
            if [ -d config/.west ]; then mv config/.west .west || true; fi
          elif [ -f west.yml ]; then
            west init -l .
            west update --depth 1 || true
          else
            echo "No west.yml found; skipping west init/update"
          fi

      - name: Debug west environment and entry points
        run: |
          . .venv/bin/activate
          echo "=== which west ==="
          which west || true
          echo
          echo "=== pip list (sample) ==="
          pip list --format=columns | sed -n '1,80p' || true
          echo
          echo "=== west help (first lines) ==="
          west --version || true
          west help | sed -n '1,60p' || true
          echo
          echo "=== west entry points ==="
          python - <<'PY'
import pkg_resources
eps = [ep.name for ep in pkg_resources.iter_entry_points('west.commands')]
print('entry_points_count=', len(eps))
for ep in eps:
    print(ep)
PY
          echo
          echo "=== repo listing ==="
          ls -la || true

      - name: Set ZEPHYR_BASE if local zephyr exists
        run: |
          if [ -d zephyr ]; then
            echo "ZEPHYR_BASE=$(pwd)/zephyr" >> $GITHUB_ENV
          fi

      - name: Build ZMK firmware
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
        run: |
          . .venv/bin/activate
          echo "Effective ZEPHYR_BASE: $ZEPHYR_BASE"
          if [ -f config/west.yml ] || [ -f west.yml ]; then
            west build -s config -b seeed_xiao_rp2040 -- -DSHIELD=macropad_4x3
          else
            west build -s config -b seeed_xiao_rp2040 -- -DSHIELD=macropad_4x3 || true
          fi

      - name: Collect firmware files
        run: |
          mkdir -p artifacts
          if [ -f build/zephyr/zephyr.uf2 ]; then cp build/zephyr/zephyr.uf2 artifacts/; fi
          if [ -f build/zephyr/zephyr.bin ]; then cp build/zephyr/zephyr.bin artifacts/; fi
          if [ -f build/zephyr/zephyr.hex ]; then cp build/zephyr/zephyr.hex artifacts/; fi
          find . -type f -path "*/build/zephyr/zephyr.*" -exec cp {} artifacts/ \; || true
          ls -la artifacts || true

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: artifacts
